<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - worldExpo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="static/css/main.css" rel="stylesheet">
</head>

<body>
    <div>
        <div class="container left">
            <div class="wrapper">
                <div class="button-container">
                    <div id="btn"></div>
                    <button id="loginFormButton" class="form-button" onclick="leftClick()">Login</button>
                    <button id="registerFormButton" class="form-button" onclick="rightClick()">Register</button>
                </div>
                    <div id="registerForm" class="form-container register" style="display: none;">
                        <!-- <h2>Register</h2> -->
                        <form id="registerApiForm" class="form">
                            <div class="input-group">
                                <!-- <label for="username">Username:</label><br> -->
                                <input type="text" id="regUsername" name="username" placeholder="Username" required><br>
                            </div>
                            <div class="input-group">
                                <!-- <label for="password">Password:</label><br> -->
                                <input type="password" id="regPassword" name="password" placeholder="Password"
                                    required><br>
                            </div>
                            <div class="input-group">
                                <!-- <label for="email">Email:</label><br> -->
                                <input type="email" id="regEmail" name="email" placeholder="Email" required><br>
                            </div>
                            <input type="submit" value="Register" class="form-submit">
                            <p id="registerMessage" class="form-message"></p>
                        </form>
                    </div>

                    <div id="loginForm" class="form-container login" style="display: block;">
                        <!-- <h2>Login</h2> -->
                        <form id="loginApiForm" class="form">
                            <div class="input-group">
                                <!-- <label for="email">Email:</label><br> -->
                                <input type="text" id="loginEmail" name="email" placeholder="Email" required><br>
                            </div>
                            <div class="input-group">
                                <!-- <label for="password">Password:</label><br> -->
                                <input type="password" id="loginPassword" name="password" placeholder="Password"
                                    required><br>
                            </div>
                            <input type="submit" value="Login" class="form-submit">
                            <p id="loginMessage" class="form-message"></p>
                        </form>
                    </div>
                </div>
            </div>

            <div class="container right">
                <canvas></canvas>
            </div>

        </div>

        <script src="static/js/slider.js"></script>
        <script type="module" src="static/js/earth.js"></script>
        <script>
            document.getElementById("registerFormButton").addEventListener("click", function () {
                document.getElementById("registerForm").style.display = "block";
                document.getElementById("loginForm").style.display = "none";
            });

            document.getElementById("loginFormButton").addEventListener("click", function () {
                document.getElementById("loginForm").style.display = "block";
                document.getElementById("registerForm").style.display = "none";
            });

            // Backend API integration
            const BACKEND_URL = "https://travelexperience-production.up.railway.app";
            
            // Login form handler
            document.getElementById("loginApiForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const email = document.getElementById("loginEmail").value;
                const password = document.getElementById("loginPassword").value;
                
                fetch(`${BACKEND_URL}/login`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                })
                .then(response => {
                    if (response.ok) {
                        window.location.href = "world.html";
                    } else {
                        document.getElementById("loginMessage").textContent = "Login failed. Please check your credentials.";
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("loginMessage").textContent = "An error occurred. Please try again.";
                });
            });

            // Register form handler
            document.getElementById("registerApiForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const username = document.getElementById("regUsername").value;
                const email = document.getElementById("regEmail").value;
                const password = document.getElementById("regPassword").value;
                
                fetch(`${BACKEND_URL}/register`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                })
                .then(response => {
                    if (response.ok) {
                        window.location.href = "world.html";
                    } else {
                        document.getElementById("registerMessage").textContent = "Registration failed. Email may already exist.";
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("registerMessage").textContent = "An error occurred. Please try again.";
                });
            });
        </script>
</body>

</html>
